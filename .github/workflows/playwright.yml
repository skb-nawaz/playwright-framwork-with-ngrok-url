name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Create .env file
      run: |
        mkdir -p env-files
        echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> env-files/.env.dev
    
    - name: Install ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update
        sudo apt install ngrok -y
    
    - name: Start ngrok tunnel
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        # Reset ngrok config to remove any saved domain
        rm -f /home/runner/.config/ngrok/ngrok.yml
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        
        # Kill any existing ngrok processes
        pkill ngrok || true
        
        # Start with random domain (no --domain flag)
        nohup ngrok http 80 --host-header=rewrite &
        
        # Wait for ngrok to start
        sleep 15
        
        # Get the dynamic URL
        for i in {1..10}; do
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | grep -o '"public_url":"[^"]*' | grep -o 'https://[^"]*' | head -1)
          if [ -n "$NGROK_URL" ]; then
            echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
            echo "✅ Ngrok tunnel: $NGROK_URL"
            break
          fi
          sleep 2
        done
        
        if [ -z "$NGROK_URL" ]; then
          echo "❌ Failed to get ngrok URL"
          exit 1
        fi
    
    - name: Run Playwright tests
      run: npm run test_dev
      env:
        ENV_NAME: dev
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        BASE_URL: ${{ env.NGROK_URL }}/orangehrm/web/index.php/auth/login
    
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30