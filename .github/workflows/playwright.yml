name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Create .env file
      run: |
        mkdir -p env-files
        echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> env-files/.env.dev
    
    - name: Install ngrok
      run: |
        curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update
        sudo apt install ngrok -y
    
    - name: Start ngrok tunnel (dynamic URL)
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
      run: |
        ngrok config add-authtoken $NGROK_AUTH_TOKEN
        pkill ngrok || true
        # Use random subdomain instead of static
        ngrok http 80 --host-header=rewrite --log=stdout &
        sleep 10
        # Extract the dynamic URL
        NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys, json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
        echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV
        echo "Ngrok tunnel: $NGROK_URL"
    
    - name: Run Playwright tests
      run: npm run test_dev
      env:
        ENV_NAME: dev
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        BASE_URL: ${{ env.NGROK_URL }}/orangehrm/web/index.php/auth/login
    
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30