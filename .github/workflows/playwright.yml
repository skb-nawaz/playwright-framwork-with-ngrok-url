name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create environment files
        run: |
          mkdir -p env-files
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > env-files/.env.dev
          echo "USER_NAME=${{ secrets.USER_NAME }}" >> env-files/.env.dev
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> env-files/.env.dev

      - name: Generate Linux Snapshots
        env:
          ENV_NAME: dev
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_NAME: ${{ secrets.USER_NAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          CI: true
        run: |
          npx playwright test tests/login-module-visual-testing.spec.ts --project=chromium --update-snapshots

      - name: Upload Linux Snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-snapshots
          path: tests/login-module-visual-testing.spec.ts-snapshots/
          retention-days: 30

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            github-page.png
            before-login.png
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 30
