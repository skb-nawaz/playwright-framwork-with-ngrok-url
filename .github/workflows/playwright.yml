name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Create .env file
      run: |
        mkdir -p env-files
        echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> env-files/.env.dev
    
    - name: Start Cloudflare Tunnel
      run: |
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        ./cloudflared tunnel --url http://localhost:80 > url.txt 2>&1 &
        sleep 12
        TUNNEL_URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' url.txt | head -1)
        echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
        echo "Tunnel: $TUNNEL_URL"
    
    - name: Run Playwright tests
      run: npm run test_dev
      env:
        ENV_NAME: dev
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        BASE_URL: ${{ env.TUNNEL_URL }}/orangehrm/web/index.php/auth/login
    
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/